events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 8080;

        # Pre-built React/react-router frontend
        root /app/.web/build/client;

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;

        # Health check answered by nginx directly — passes as soon as the
        # container is up, regardless of Python backend startup time
        location = /_health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Reflex WebSocket, state events, uploads, and our FastAPI routes
        # all proxy to the Python backend on localhost:8000
        location ~* ^/(ping|_event|_upload|_stream|api) {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400;
        }

        # Static assets — cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback: unknown paths serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
