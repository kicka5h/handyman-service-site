app = "handyman-service-site"
primary_region = "sjc"  # San Jose (closest to Seattle on free tier)

[deploy]
  strategy = "rolling"

[build]

[env]
  PORT    = "8080"
  DB_PATH = "/data/submissions.db"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    timeout      = "10s"
    path         = "/_health"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

# Persistent volume for SQLite — create once with:
#   fly volumes create handyman_data --size 1 --region sjc
# [[mounts]]
#   source      = "handyman_data"
#   destination = "/data"
