server {
    listen 8000;

    # Pre-built React/react-router frontend
    root /app/.web/build/client;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Reflex WebSocket, state events, uploads, and our FastAPI routes
    # all proxy to the Python backend on localhost:8001
    location ~* ^/(ping|_event|_upload|_stream|_health|api) {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;   # keep WebSocket connections alive
    }

    # Static assets — cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths serve index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
